packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  canvas: false
  msgpackr-extract: true
  prisma: true
  tesseract.js: true
  unrs-resolver: true

onlyBuiltDependencies:
  - bcrypt
  - tesseract.js
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
